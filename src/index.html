<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>File Diff Desktop</title>
    <link rel="stylesheet" href="styles.css" />
    <script src="vendor/monaco/vs/loader.js"></script>
    <script>
      (function () {
        var vs = "vendor/monaco/vs";
        self.MonacoEnvironment = {
          getWorkerUrl: function (_moduleId, label) {
            if (label === "json") return vs + "/language/json/json.worker.js";
            if (label === "css" || label === "scss" || label === "less")
              return vs + "/language/css/css.worker.js";
            if (label === "html" || label === "handlebars" || label === "razor")
              return vs + "/language/html/html.worker.js";
            if (label === "typescript" || label === "javascript" || label === "tsx" || label === "jsx")
              return vs + "/language/typescript/ts.worker.js";
            return vs + "/editor/editor.worker.js";
          },
        };
        require.config({ paths: { vs: vs } });
        require(["vs/editor/editor.main"], function () {
          window.__monacoLoaded = true;
        });
      })();
    </script>
    <script type="module" src="main.js"></script>
  </head>
  <body>

    <!-- ── Top toolbar ──────────────────────────────── -->
    <header class="toolbar">
      <span class="app-title">File Diff</span>
      <div class="toolbar-actions">
        <button type="button" id="btn-refresh" title="Re-scan both folders">Refresh</button>
      </div>
    </header>

    <!-- ── Tab bar ──────────────────────────────────── -->
    <div class="tab-bar" id="tab-bar">
      <button class="tab is-active" id="tab-btn-folder" data-tab-id="folder">
        <svg width="12" height="12" viewBox="0 0 16 14" fill="currentColor" aria-hidden="true">
          <path d="M0 2.5A1.5 1.5 0 0 1 1.5 1h4.086a1.5 1.5 0 0 1 1.06.44L7.707 2.5H14.5A1.5 1.5 0 0 1 16 4v8a1.5 1.5 0 0 1-1.5 1.5h-13A1.5 1.5 0 0 1 0 12.5v-10z"/>
        </svg>
        <span class="tab-title">Folder Compare</span>
      </button>
    </div>

    <!-- ── Tab panels ───────────────────────────────── -->
    <div class="tab-panels" id="tab-panels">

      <!-- Folder compare panel (always present) -->
      <div class="tab-panel is-active" id="panel-folder">

        <!-- Path / pick-folder bar -->
        <div class="fc-pathbar">
          <div class="fc-pathbar-side">
            <span class="side-label side-left">LEFT</span>
            <span id="path-left" class="fc-path-text" title=""></span>
            <button type="button" id="btn-pick-left">Pick Folder</button>
          </div>
          <div class="fc-pathbar-divider"></div>
          <div class="fc-pathbar-side">
            <span class="side-label side-right">RIGHT</span>
            <span id="path-right" class="fc-path-text" title=""></span>
            <button type="button" id="btn-pick-right">Pick Folder</button>
          </div>
        </div>

        <!-- Empty / drop state (shown when no folders picked) -->
        <div class="fc-empty" id="fc-empty">
          <p class="fc-empty-title">No folders selected</p>
          <p class="fc-empty-sub">
            Pick two folders above to compare them, or drop individual files below to diff them directly.
          </p>
          <div class="fc-drop-row">
            <div
              class="drop-zone"
              id="drop-left"
              data-side="left"
              tabindex="0"
              role="button"
              aria-label="Left file: drag and drop here or click to browse"
            >
              <svg class="drop-zone-icon" width="28" height="28" viewBox="0 0 24 24"
                   fill="none" stroke="currentColor" stroke-width="1.5"
                   stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <path d="M4 16v1a3 3 0 0 0 3 3h10a3 3 0 0 0 3-3v-1"/>
                <polyline points="16 6 12 2 8 6"/>
                <line x1="12" y1="2" x2="12" y2="15"/>
              </svg>
              <p class="drop-zone-primary">Left — drag &amp; drop file</p>
              <p class="drop-zone-secondary">or click to browse</p>
            </div>

            <div class="fc-drop-vs">vs</div>

            <div
              class="drop-zone"
              id="drop-right"
              data-side="right"
              tabindex="0"
              role="button"
              aria-label="Right file: drag and drop here or click to browse"
            >
              <svg class="drop-zone-icon" width="28" height="28" viewBox="0 0 24 24"
                   fill="none" stroke="currentColor" stroke-width="1.5"
                   stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <path d="M4 16v1a3 3 0 0 0 3 3h10a3 3 0 0 0 3-3v-1"/>
                <polyline points="16 6 12 2 8 6"/>
                <line x1="12" y1="2" x2="12" y2="15"/>
              </svg>
              <p class="drop-zone-primary">Right — drag &amp; drop file</p>
              <p class="drop-zone-secondary">or click to browse</p>
            </div>
          </div>
        </div>

        <!-- Folder compare table (shown when both folders are picked) -->
        <div class="fc-table hidden" id="fc-table">
          <div class="fc-body" id="fc-body">
            <!-- Sticky column header row -->
            <div class="fc-col-header">
              <div class="fc-side">
                <span class="fcc-name">Name</span>
                <span class="fcc-size">Size</span>
                <span class="fcc-date">Modified</span>
              </div>
              <div class="fc-gutter-h"></div>
              <div class="fc-side">
                <span class="fcc-name">Name</span>
                <span class="fcc-size">Size</span>
                <span class="fcc-date">Modified</span>
              </div>
            </div>
            <!-- rows injected by JS -->
          </div>
        </div>

      </div>
      <!-- dynamic file diff panels are appended here by JS -->
    </div>

    <!-- ── Status bar ──────────────────────────────── -->
    <p id="status-msg" class="status-msg" aria-live="polite"></p>

    <input id="input-left-file"  type="file" hidden />
    <input id="input-right-file" type="file" hidden />
  </body>
</html>
