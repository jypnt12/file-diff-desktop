<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>File Diff Desktop</title>
    <link rel="stylesheet" href="styles.css" />
    <script src="vendor/monaco/vs/loader.js"></script>
    <script>
      (function () {
        var vs = "vendor/monaco/vs";
        self.MonacoEnvironment = {
          getWorkerUrl: function (_moduleId, label) {
            if (label === "json") return vs + "/language/json/json.worker.js";
            if (label === "css" || label === "scss" || label === "less")
              return vs + "/language/css/css.worker.js";
            if (label === "html" || label === "handlebars" || label === "razor")
              return vs + "/language/html/html.worker.js";
            if (
              label === "typescript" ||
              label === "javascript" ||
              label === "tsx" ||
              label === "jsx"
            )
              return vs + "/language/typescript/ts.worker.js";
            return vs + "/editor/editor.worker.js";
          },
        };
        require.config({ paths: { vs: vs } });
        require(["vs/editor/editor.main"], function () {
          window.__monacoLoaded = true;
        });
      })();
    </script>
    <script type="module" src="main.js"></script>
  </head>
  <body>
    <!-- ── Top toolbar ───────────────────────── -->
    <header class="toolbar">
      <span class="app-title">File Diff</span>
      <div class="toolbar-actions">
        <button type="button" id="btn-refresh">Refresh</button>
        <button type="button" id="btn-save-left" disabled>Save Left</button>
        <button type="button" id="btn-save-right" disabled>Save Right</button>
      </div>
    </header>

    <!-- ── Left / Right source panels ──────── -->
    <div class="source-bar">
      <!-- LEFT -->
      <div class="source-panel">
        <div class="source-panel-hdr">
          <span class="side-label side-left">LEFT</span>
          <span id="path-left" class="source-path"></span>
          <button type="button" id="btn-pick-left">Pick Folder</button>
        </div>
        <div
          class="drop-zone"
          id="drop-left"
          data-side="left"
          tabindex="0"
          role="button"
          aria-label="Left side: drag and drop a file here, or click to browse"
        >
          <svg
            class="drop-zone-icon"
            width="30"
            height="30"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="1.5"
            stroke-linecap="round"
            stroke-linejoin="round"
            aria-hidden="true"
          >
            <path d="M4 16v1a3 3 0 0 0 3 3h10a3 3 0 0 0 3-3v-1" />
            <polyline points="16 6 12 2 8 6" />
            <line x1="12" y1="2" x2="12" y2="15" />
          </svg>
          <p class="drop-zone-primary">Drag &amp; drop your file here</p>
          <p class="drop-zone-secondary">or click to browse a single file</p>
        </div>
      </div>

      <div class="source-vs">vs</div>

      <!-- RIGHT -->
      <div class="source-panel">
        <div class="source-panel-hdr">
          <span class="side-label side-right">RIGHT</span>
          <span id="path-right" class="source-path"></span>
          <button type="button" id="btn-pick-right">Pick Folder</button>
        </div>
        <div
          class="drop-zone"
          id="drop-right"
          data-side="right"
          tabindex="0"
          role="button"
          aria-label="Right side: drag and drop a file here, or click to browse"
        >
          <svg
            class="drop-zone-icon"
            width="30"
            height="30"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="1.5"
            stroke-linecap="round"
            stroke-linejoin="round"
            aria-hidden="true"
          >
            <path d="M4 16v1a3 3 0 0 0 3 3h10a3 3 0 0 0 3-3v-1" />
            <polyline points="16 6 12 2 8 6" />
            <line x1="12" y1="2" x2="12" y2="15" />
          </svg>
          <p class="drop-zone-primary">Drag &amp; drop your file here</p>
          <p class="drop-zone-secondary">or click to browse a single file</p>
        </div>
      </div>
    </div>

    <!-- ── Main: tree + diff editor ─────────── -->
    <div class="main">
      <aside class="tree-pane">
        <div class="pane-title">Folder Compare</div>
        <div id="tree-root" class="tree-scroll"></div>
      </aside>
      <section class="editor-pane">
        <div class="pane-title" id="file-title">Select a file from the tree</div>
        <div id="diff-container"></div>
      </section>
    </div>

    <!-- ── Status bar ──────────────────────── -->
    <p id="status-msg" class="status-msg" aria-live="polite"></p>

    <input id="input-left-file" type="file" hidden />
    <input id="input-right-file" type="file" hidden />
  </body>
</html>
